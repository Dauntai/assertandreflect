# Build and deploy to Hostinger via Git (build branch)
# Hostinger pulls from the "build" branch. This workflow builds and pushes to it.
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

permissions:
  contents: write   # Required to push to the build branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for deployment
        run: npm run build:deploy

      - name: Push to build branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Deploy: (${{ github.sha }}) ${{ github.event.head_commit.message }}"
